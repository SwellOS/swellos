name: Bug Report
description: Report a problem with SwellOS
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: SwellOS version (from /etc/swellos-release or RELEASE_NOTES.md)
      placeholder: v0.1-alpha
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - swell-build
        - sbpm
        - swell-installer
        - kernel
        - packages
        - documentation
        - website
        - other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce this?
      placeholder: |
        1. Run '...'
        2. See error
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or build output
      render: shell
