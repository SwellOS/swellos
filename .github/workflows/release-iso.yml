name: Release ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'ISO version label'
        required: false
        default: '0.1-dev'

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc bison flex libelf-dev libssl-dev \
            squashfs-tools xorriso grub-pc-bin grub-common cpio \
            autoconf automake libtool pkg-config

      - name: Checkout SwellOS kernel config
        uses: actions/checkout@v4
        with:
          repository: SwellOS/kernel
          path: swell-kernel

      - name: Download upstream kernel source
        run: |
          KERNEL_URL="https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.tar.xz"
          echo "Downloading kernel source from $KERNEL_URL ..."
          curl -sL "$KERNEL_URL" | tar xJf -
          ls -d linux-6.12/

      - name: Apply Swell config and build kernel
        run: |
          cd linux-6.12
          cp ../swell-kernel/config/x86_64/config-6.x-swell .config
          make olddefconfig
          make -j$(nproc) bzImage
          mkdir -p /tmp/kernel-output
          cp arch/x86_64/boot/bzImage /tmp/kernel-output/

      - name: Checkout swell-build
        uses: actions/checkout@v4
        with:
          repository: SwellOS/swell-build
          path: swell-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build swell-build
        run: |
          cd swell-build
          cargo build --release

      - name: Build busybox
        run: |
          BUSYBOX_VER="1.36.1"
          curl -sL "https://busybox.net/downloads/busybox-$BUSYBOX_VER.tar.bz2" | tar xjf -
          cd "busybox-$BUSYBOX_VER"
          curl -sL "https://busybox.net/downloads/binaries/$BUSYBOX_VER-x86_64-linux-musl/busybox" -o /tmp/busybox-static
          chmod +x /tmp/busybox-static
        continue-on-error: true

      - name: Fallback: install busybox from distro
        run: |
          sudo apt-get install -y -qq busybox-static 2>/dev/null || true
          if [ -f /bin/busybox ]; then cp /bin/busybox /tmp/busybox-static; fi
          if [ -f /usr/bin/busybox ]; then cp /usr/bin/busybox /tmp/busybox-static; fi
          chmod +x /tmp/busybox-static 2>/dev/null || true

      - name: Create minimal rootfs
        run: |
          mkdir -p /tmp/iso-rootfs/{bin,sbin,etc,dev,proc,sys,run,tmp,var/lib,var/log,usr/bin,usr/sbin,root}
          if [ -f /tmp/busybox-static ]; then
            cp /tmp/busybox-static /tmp/iso-rootfs/bin/busybox
            for applet in sh mount umount sleep cat echo ls mkdir cp mv rm ps kill dmesg vi clear login adduser deluser passwd reboot poweroff hostname ping ifconfig ip sed grep awk cut sort uniq head tail wc find xargs tar gzip; do
              ln -sf busybox /tmp/iso-rootfs/bin/$applet
            done
            ln -sf ../bin/busybox /tmp/iso-rootfs/sbin/init
          fi
          cat > /tmp/iso-rootfs/etc/inittab << 'EOF'
          ::sysinit:/etc/init.d/rcS
          ::askfirst:-/bin/sh
          EOF
          mkdir -p /tmp/iso-rootfs/etc/init.d
          cat > /tmp/iso-rootfs/etc/init.d/rcS << 'RCEOF'
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev
          echo "Welcome to SwellOS live environment"
          RCEOF
          chmod 755 /tmp/iso-rootfs/etc/init.d/rcS

      - name: Build ISO
        run: |
          VERSION="${{ github.event.inputs.version || '0.1-dev' }}"
          cd swell-build
          ./target/release/swell-build iso \
            --kernel /tmp/kernel-output/bzImage \
            --root /tmp/iso-rootfs \
            --version "$VERSION" \
            --label "SWELLOS_LIVE" \
            --output "/tmp/swellos-$VERSION-x86_64.iso" \
            --force

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: swellos-iso
          path: /tmp/swellos-*.iso

  attach-to-release:
    needs: build-iso
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: swellos-iso
          path: /tmp

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/swellos-*.iso
          generate_release_notes: true
          fail_on_unmatched_files: false
