name: Build ISO
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'ISO version label'
        default: '0.1-dev'
jobs:
  build-iso:
    runs-on: ubuntu-24.04
    steps:
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc bison flex libelf-dev libssl-dev \
            squashfs-tools xorriso grub-pc-bin grub-common cpio \
            autoconf automake libtool pkg-config
      - name: Kernel config
        uses: actions/checkout@v4
        with:
          repository: SwellOS/kernel
          path: swell-kernel
      - name: Download kernel
        run: |
          curl -sL 'https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.tar.xz' | tar xJf -
      - name: Build kernel
        run: |
          cd linux-6.12
          cp ../swell-kernel/config/x86_64/config-6.x-swell .config
          make olddefconfig
          make -j$(nproc) bzImage
          mkdir -p /tmp/kernel-output
          cp arch/x86_64/boot/bzImage /tmp/kernel-output/
      - name: Checkout swell-build
        uses: actions/checkout@v4
        with:
          repository: SwellOS/swell-build
          path: swell-build
      - name: Checkout sbpm
        uses: actions/checkout@v4
        with:
          repository: SwellOS/sbpm
          path: sbpm
      - name: Checkout supm
        uses: actions/checkout@v4
        with:
          repository: SwellOS/supm
          path: supm
      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build swell-build
        run: cd swell-build && cargo build --release
      - name: Build sbpm
        run: cd sbpm && cargo build --release
      - name: Build supm
        run: cd supm && cargo build --release
      - name: Busybox
        run: |
          sudo apt-get install -y -qq busybox-static
          cp /bin/busybox /tmp/busybox-static
      - name: Rootfs
        run: |
          mkdir -p /tmp/iso-rootfs/{bin,sbin,etc,dev,proc,sys,run,tmp,var/lib,var/log,usr/bin,usr/sbin,root,etc/init.d,lib/x86_64-linux-gnu,usr/share/udhcpc}
          cp /tmp/busybox-static /tmp/iso-rootfs/bin/busybox
          for a in sh mount umount sleep cat echo ls mkdir cp mv rm ps kill dmesg vi clear login adduser deluser passwd reboot poweroff hostname ping ifconfig ip sed grep awk cut sort uniq head tail wc find xargs tar gzip udhcpc; do
            ln -sf busybox /tmp/iso-rootfs/bin/$a
          done
          ln -sf ../bin/busybox /tmp/iso-rootfs/sbin/init
          echo -e '::sysinit:/etc/init.d/rcS\n::askfirst:-/bin/sh' > /tmp/iso-rootfs/etc/inittab
          echo -e '#!/bin/sh\nmount -t proc none /proc\nmount -t sysfs none /sys\nmount -t devtmpfs none /dev\n\n# Network: DHCP on all ethernet interfaces\nfor iface in /sys/class/net/e*; do\n  [ -d "$iface" ] || continue\n  iface_name=$(basename "$iface")\n  ip link set "$iface_name" up\n  udhcpc -i "$iface_name" -s /usr/share/udhcpc/default.script -q 2>/dev/null &\ndone\n\necho "Welcome to SwellOS"' > /tmp/iso-rootfs/etc/init.d/rcS
          chmod 755 /tmp/iso-rootfs/etc/init.d/rcS

          # sbpm + supm binaries
          cp sbpm/target/release/sbpm /tmp/iso-rootfs/usr/bin/sbpm
          cp supm/target/release/supm /tmp/iso-rootfs/usr/bin/supm

          # sbpm depends: libssl, libcrypto, libbrotli, libzstd, libz, libgcc_s, libc, libm, ld-linux
          for lib in \
            /usr/lib/x86_64-linux-gnu/libssl.so.* \
            /usr/lib/x86_64-linux-gnu/libcrypto.so.* \
            /usr/lib/x86_64-linux-gnu/libbrotli*.so.* \
            /usr/lib/x86_64-linux-gnu/libzstd.so.* \
            /usr/lib/x86_64-linux-gnu/libz.so.* \
            /usr/lib/x86_64-linux-gnu/libgcc_s.so.* \
            /usr/lib/x86_64-linux-gnu/libm.so.* \
            /lib/x86_64-linux-gnu/libc.so.* \
            /lib/x86_64-linux-gnu/libm.so.* \
            /lib/x86_64-linux-gnu/ld-linux-x86-64.so.*; do
            for f in $lib; do
              [ -f "$f" ] && cp -L "$f" /tmp/iso-rootfs/lib/x86_64-linux-gnu/
            done
          done

          # udhcpc default script
          if [ -f /usr/share/udhcpc/default.script ]; then
            cp /usr/share/udhcpc/default.script /tmp/iso-rootfs/usr/share/udhcpc/default.script
          else
            cat > /tmp/iso-rootfs/usr/share/udhcpc/default.script << 'UEOF'
#!/bin/sh
case "$1" in
  bound|renew)
    ip addr add "$ip/$mask" dev "$interface" 2>/dev/null
    [ -n "$router" ] && ip route add default via "$router"
    echo "nameserver $dns" > /etc/resolv.conf 2>/dev/null
    ;;
  deconfig)
    ip addr flush dev "$interface"
    ;;
esac
UEOF
          fi
          chmod 755 /tmp/iso-rootfs/usr/share/udhcpc/default.script

          # sbpm db directory
          mkdir -p /tmp/iso-rootfs/var/lib/sbpm/installed
          echo 'https://packages.swellos.org/repo.db' > /tmp/iso-rootfs/var/lib/sbpm/repo-url
      - name: Firmware
        run: |
          sudo apt-get install -y -qq linux-firmware
          mkdir -p /tmp/iso-rootfs/usr/lib/firmware
          cp -r /usr/lib/firmware/iwlwifi-*.ucode* /tmp/iso-rootfs/usr/lib/firmware/ 2>/dev/null || true
          for d in intel amdgpu ath10k ath11k ath12k rtw88 rtw89 rtl_bt rtl_nic rtlwifi brcm cypress mediatek qca qed intel-ucode; do
            [ -d "/usr/lib/firmware/$d" ] && cp -r "/usr/lib/firmware/$d" /tmp/iso-rootfs/usr/lib/firmware/
          done
      - name: Build ISO
        run: |
          VERSION="${{ github.event.inputs.version || '0.1-dev' }}"
          cd swell-build
          ./target/release/swell-build iso \
            --kernel /tmp/kernel-output/bzImage \
            --root /tmp/iso-rootfs \
            --version "$VERSION" \
            --label "SWELLOS_LIVE" \
            --output "/tmp/swellos-$VERSION-x86_64.iso" \
            --force
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: swellos-iso
          path: /tmp/swellos-*.iso
  attach:
    needs: build-iso
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: swellos-iso
          path: /tmp
      - uses: softprops/action-gh-release@v2
        with:
          files: /tmp/swellos-*.iso
          generate_release_notes: true
          fail_on_unmatched_files: false
